<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="theme-color" content="#FFF6EC">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>나의 루틴</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#FFF6EC; color:#4A3B32; min-height:100vh; padding-bottom:90px;
  }
  header { padding:22px 20px 8px; }
  h1 { font-size:22px; font-weight:800; }
  .date { font-size:14px; color:#A08874; margin-top:2px; }

  /* progress */
  .progress-wrap { margin:14px 20px 6px; background:#FFFFFF; border-radius:18px; padding:14px 16px; box-shadow:0 2px 8px rgba(160,120,80,.08); }
  .progress-label { display:flex; justify-content:space-between; font-size:13px; font-weight:700; margin-bottom:8px; }
  .progress-label .pct { color:#FF8A5C; }
  .bar { height:14px; background:#FFE8D6; border-radius:10px; overflow:hidden; }
  .bar-fill { height:100%; width:0%; border-radius:10px; background:linear-gradient(90deg,#FFB25C,#FF8A5C); transition:width .4s ease; }
  .cheer { text-align:center; font-size:14px; font-weight:700; color:#FF8A5C; margin-top:8px; display:none; }

  /* task list */
  .list { padding:10px 20px; }
  .task {
    display:flex; align-items:center; gap:12px;
    background:#FFFFFF; border-radius:16px; padding:13px 14px; margin-bottom:10px;
    box-shadow:0 2px 6px rgba(160,120,80,.07); cursor:pointer; user-select:none;
    transition:background .2s;
  }
  .task.done { background:#FFF0E0; }
  .task .icon { font-size:22px; width:30px; text-align:center; flex-shrink:0; }
  .task .name { flex:1; font-size:15px; font-weight:600; }
  .task.done .name { color:#B89B82; text-decoration:line-through; text-decoration-color:#FFB25C; }
  .stamp-slot {
    width:44px; height:44px; flex-shrink:0; border-radius:50%;
    border:2px dashed #E8D5C0; display:flex; align-items:center; justify-content:center;
    font-size:24px;
  }
  .task.done .stamp-slot { border:2px solid #FFB25C; background:#FFF8EF; }
  .stamp { display:inline-block; animation:stampIn .35s cubic-bezier(.2,1.6,.4,1); }
  @keyframes stampIn {
    0% { transform:scale(2.4) rotate(-18deg); opacity:0; }
    100% { transform:scale(1) rotate(0deg); opacity:1; }
  }

  /* tabs */
  nav {
    position:fixed; bottom:0; left:0; right:0; background:#FFFFFF; z-index:10;
    display:flex; border-top:1px solid #F3E3D2; padding-bottom:env(safe-area-inset-bottom);
  }
  nav button {
    flex:1; padding:12px 0 10px; background:none; border:none; font-size:12px;
    color:#B8A28C; font-weight:700; cursor:pointer; font-family:inherit;
  }
  nav button .nicon { display:block; font-size:20px; margin-bottom:2px; }
  nav button.active { color:#FF8A5C; }

  .page { display:none; }
  .page.show { display:block; }

  /* history */
  .cal-head { display:flex; align-items:center; justify-content:space-between; padding:14px 24px 6px; }
  .cal-head b { font-size:17px; }
  .cal-head button { background:#FFFFFF; border:none; border-radius:10px; width:34px; height:34px; font-size:15px; cursor:pointer; box-shadow:0 1px 4px rgba(160,120,80,.12); color:#4A3B32; }
  .cal { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; padding:8px 18px; }
  .cal .dow { text-align:center; font-size:11px; color:#B8A28C; font-weight:700; padding:4px 0; }
  .cell {
    aspect-ratio:1; border-radius:12px; background:#FFFFFF; display:flex; flex-direction:column;
    align-items:center; justify-content:center; font-size:13px; font-weight:600; cursor:pointer;
    box-shadow:0 1px 3px rgba(160,120,80,.06);
  }
  .cell.empty { background:transparent; box-shadow:none; cursor:default; }
  .cell .mini { font-size:10px; margin-top:1px; }
  .cell.today { outline:2px solid #FF8A5C; }
  .cell.sel { background:#FF8A5C; color:#fff; }
  .day-detail { margin:10px 20px; background:#FFFFFF; border-radius:16px; padding:14px 16px; box-shadow:0 2px 6px rgba(160,120,80,.07); }
  .day-detail h3 { font-size:14px; margin-bottom:8px; }
  .day-detail div { font-size:14px; padding:3px 0; }
  .day-detail .no { color:#C9B49E; }

  /* edit */
  .edit-list { padding:12px 20px 0; }
  .erow { display:flex; align-items:center; gap:8px; background:#FFFFFF; border-radius:14px; padding:10px 12px; margin-bottom:8px; box-shadow:0 1px 4px rgba(160,120,80,.07); }
  .erow .icon { font-size:20px; width:26px; text-align:center; }
  .erow .name { flex:1; font-size:14px; font-weight:600; }
  .erow button { background:#FFF0E0; border:none; border-radius:8px; width:32px; height:32px; font-size:14px; cursor:pointer; color:#4A3B32; }
  .erow button.del { background:#FFE3E0; }
  .add-form { margin:14px 20px; background:#FFFFFF; border-radius:16px; padding:14px; box-shadow:0 2px 6px rgba(160,120,80,.07); }
  .add-form h3 { font-size:14px; margin-bottom:10px; }
  .emoji-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
  .emoji-row button { font-size:20px; background:#FFF6EC; border:2px solid transparent; border-radius:10px; width:38px; height:38px; cursor:pointer; }
  .emoji-row button.sel { border-color:#FF8A5C; background:#FFF0E0; }
  .add-form input { width:100%; padding:11px 12px; border:1.5px solid #EEDCC8; border-radius:12px; font-size:15px; font-family:inherit; background:#FFFBF6; color:#4A3B32; outline:none; }
  .add-form input:focus { border-color:#FFB25C; }
  .add-btn { margin-top:10px; width:100%; padding:12px; background:linear-gradient(90deg,#FFB25C,#FF8A5C); color:#fff; font-weight:800; font-size:15px; border:none; border-radius:12px; cursor:pointer; font-family:inherit; }
  .hint { font-size:12px; color:#B8A28C; text-align:center; padding:10px 24px 20px; }

  /* to-do */
  .section-title { font-size:14px; font-weight:800; padding:14px 24px 6px; color:#8A6F58; }
  .gcal-box { margin:0 20px; background:#FFFFFF; border-radius:16px; padding:12px 14px; box-shadow:0 2px 6px rgba(160,120,80,.07); }
  .gcal-btn { width:100%; padding:11px; background:#FFF0E0; border:1.5px dashed #FFB25C; border-radius:12px; font-size:14px; font-weight:700; color:#D97742; cursor:pointer; font-family:inherit; }
  .gcal-note { font-size:12px; color:#B8A28C; text-align:center; padding:6px 4px 0; }
  .gevent { display:flex; align-items:center; gap:10px; padding:9px 4px; border-bottom:1px solid #FFF3E6; font-size:14px; }
  .gevent:last-child { border-bottom:none; }
  .gevent .gtime { color:#FF8A5C; font-weight:800; font-size:12px; min-width:74px; }
  .gcal-cal { font-size:11px; color:#B8A28C; }
  .todo-add { display:flex; gap:8px; margin:6px 20px 4px; }
  .todo-add input { flex:1; min-width:0; padding:12px 14px; border:1.5px solid #EEDCC8; border-radius:14px; font-size:15px; font-family:inherit; background:#FFFBF6; color:#4A3B32; outline:none; }
  .todo-add input:focus { border-color:#FFB25C; }
  .todo-add button { width:48px; border:none; border-radius:14px; background:linear-gradient(90deg,#FFB25C,#FF8A5C); color:#fff; font-size:22px; font-weight:800; cursor:pointer; }
  .todo-item { display:flex; align-items:center; gap:10px; background:#FFFFFF; border-radius:14px; padding:11px 12px; margin-bottom:8px; box-shadow:0 1px 4px rgba(160,120,80,.07); }
  .todo-item .chk { width:26px; height:26px; border-radius:50%; border:2px solid #E8D5C0; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:15px; cursor:pointer; background:none; }
  .todo-item.done .chk { border-color:#FFB25C; background:#FFF0E0; }
  .todo-item .txt { flex:1; font-size:15px; font-weight:600; cursor:pointer; }
  .todo-item.done .txt { color:#B89B82; text-decoration:line-through; text-decoration-color:#FFB25C; }
  .todo-item .old { font-size:11px; color:#C9B49E; }
  .todo-item button.del { background:#FFE3E0; border:none; border-radius:8px; width:30px; height:30px; font-size:13px; cursor:pointer; color:#4A3B32; flex-shrink:0; }

  /* 길게 눌러 순서 이동 */
  .task, .todo-item { user-select:none; -webkit-user-select:none; }
  .sort-ghost { opacity:.4; }
  .drag-handle { touch-action:none; cursor:grab; color:#C9B49E; font-size:20px; font-weight:800; padding:8px 2px 8px 10px; flex-shrink:0; user-select:none; -webkit-user-select:none; }
  .emoji-btn { width:48px; flex-shrink:0; border:1.5px solid #EEDCC8; border-radius:14px; background:#FFFBF6; font-size:20px; cursor:pointer; }
  #routine-emoji-row { margin:8px 20px 0; }

  /* 스와이프 삭제 + 아이콘 완료 */
  .task-wrap { position:relative; margin-bottom:10px; }
  .task-wrap .task { margin-bottom:0; position:relative; z-index:1; transition:transform .25s ease; }
  .swipe-del { position:absolute; top:0; right:0; bottom:0; width:76px; border:none; border-radius:16px; background:#FF6B5C; color:#fff; font-size:14px; font-weight:800; cursor:pointer; font-family:inherit; }
  .icon-btn { width:46px; height:46px; border-radius:50%; border:2px dashed #E8D5C0; background:none; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; position:relative; cursor:pointer; padding:0; }
  .icon-btn.on { border:2px solid #FFB25C; background:#FFF8EF; }
  .icon-btn .badge { position:absolute; right:-5px; bottom:-5px; width:20px; height:20px; border-radius:50%; background:#FF8A5C; color:#fff; font-size:12px; display:flex; align-items:center; justify-content:center; font-weight:800; }

  /* 타이머 */
  .timer-chip { border:1px solid #FFB25C; background:#FFF0E0; color:#D97742; border-radius:10px; padding:5px 8px; font-size:12px; font-weight:700; cursor:pointer; flex-shrink:0; font-family:inherit; white-space:nowrap; }
  #sheet-back { position:fixed; inset:0; background:rgba(74,59,50,.4); z-index:30; display:none; }
  #timer-sheet { position:fixed; left:0; right:0; bottom:0; background:#FFF6EC; border-radius:24px 24px 0 0; padding:18px 20px calc(24px + env(safe-area-inset-bottom)); z-index:31; display:none; box-shadow:0 -6px 24px rgba(160,120,80,.25); }
  .sheet-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .sheet-head b { font-size:16px; }
  .sheet-head button { background:#FFF0E0; border:none; border-radius:10px; width:34px; height:34px; font-size:15px; cursor:pointer; color:#4A3B32; }
  .timer-presets { display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
  .timer-presets button { border:1px solid #EEDCC8; background:#FFFBF6; color:#8A6F58; border-radius:10px; padding:6px 11px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
  .timer-presets button.sel { border-color:#FF8A5C; background:#FFF0E0; color:#D97742; }
  .timer-presets input { width:64px; padding:6px 8px; border:1px solid #EEDCC8; border-radius:10px; font-size:13px; font-family:inherit; background:#FFFBF6; color:#4A3B32; outline:none; text-align:center; }
  .timer-circle { display:flex; justify-content:center; margin-bottom:12px; }
  .timer-btns { display:flex; gap:8px; justify-content:center; }
  .timer-btns button { border:none; border-radius:12px; padding:12px 0; font-size:15px; font-weight:800; cursor:pointer; font-family:inherit; }
  #timer-start { background:linear-gradient(90deg,#FFB25C,#FF8A5C); color:#fff; width:150px; }
  #timer-reset { background:#FFF0E0; color:#4A3B32; width:52px; }

  /* 루틴 설정 시트 (이름 + 요일) */
  #edit-back { position:fixed; inset:0; background:rgba(74,59,50,.4); z-index:30; display:none; }
  #edit-sheet { position:fixed; left:0; right:0; bottom:0; background:#FFF6EC; border-radius:24px 24px 0 0; padding:18px 20px calc(24px + env(safe-area-inset-bottom)); z-index:31; display:none; box-shadow:0 -6px 24px rgba(160,120,80,.25); }
  .sheet-input { width:100%; padding:12px 14px; border:1.5px solid #EEDCC8; border-radius:12px; font-size:15px; font-family:inherit; background:#FFFBF6; color:#4A3B32; outline:none; margin-bottom:12px; }
  .sheet-label { font-size:13px; font-weight:700; color:#8A6F58; margin-bottom:6px; }
  .day-presets { display:flex; gap:6px; margin-bottom:8px; }
  .day-presets button { flex:1; padding:8px 0; border-radius:10px; border:1px solid #EEDCC8; background:#FFFBF6; color:#8A6F58; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
  .day-chips { display:flex; gap:5px; margin-bottom:16px; }
  .day-chips button { flex:1; padding:10px 0; border-radius:10px; border:1px solid #EEDCC8; background:#FFFBF6; color:#8A6F58; font-weight:700; cursor:pointer; font-family:inherit; font-size:14px; }
  .day-chips button.sel { border-color:#FF8A5C; background:#FFF0E0; color:#D97742; }
  .sheet-save { width:100%; padding:13px; border:none; border-radius:12px; background:linear-gradient(90deg,#FFB25C,#FF8A5C); color:#fff; font-weight:800; font-size:15px; cursor:pointer; font-family:inherit; }
  .day-sub { display:block; font-size:11px; color:#B8A28C; font-weight:600; margin-top:2px; }
</style>
</head>
<body>

<!-- 오늘 -->
<div class="page show" id="page-today">
  <header>
    <h1>오늘의 루틴 🌞</h1>
    <div class="date" id="today-date"></div>
  </header>
  <div class="progress-wrap">
    <div class="progress-label"><span id="prog-text">0 / 0 완료</span><span class="pct" id="prog-pct">0%</span></div>
    <div class="bar"><div class="bar-fill" id="prog-fill"></div></div>
    <div class="cheer" id="cheer">🎉 오늘 루틴 전부 완료! 최고예요! 🎉</div>
  </div>
  <div class="todo-add" style="margin-top:10px">
    <button class="emoji-btn" id="routine-emoji-btn" onclick="toggleRoutineEmoji()">✨</button>
    <input id="routine-input" type="text" placeholder="새 루틴 입력" maxlength="30">
    <button onclick="addRoutineInline()">+</button>
  </div>
  <div class="emoji-row" id="routine-emoji-row" style="display:none"></div>
  <div class="list" id="task-list"></div>
  <div class="hint">아이콘 탭=완료 · 이름 탭=수정 · ≡를 잡고 끌면 순서 이동 · 왼쪽으로 밀면 삭제</div>
</div>

<!-- To-do -->
<div class="page" id="page-todo">
  <header>
    <h1>To-do 📝</h1>
    <div class="date" id="todo-date"></div>
  </header>

  <div class="section-title">📆 오늘의 구글캘린더 일정</div>
  <div class="gcal-box" id="gcal-box">
    <button class="gcal-btn" id="gcal-btn" onclick="connectGcal()">구글캘린더 연결하기</button>
    <div class="gcal-note" id="gcal-note"></div>
    <div id="gcal-list"></div>
  </div>

  <div class="section-title">✅ 나의 할일</div>
  <div class="todo-add">
    <input id="todo-input" type="text" placeholder="할일 입력" maxlength="60">
    <button onclick="addTodo()">+</button>
  </div>
  <div class="list" id="todo-list"></div>
  <div class="hint">완료 못한 할일은 자동으로 다음날로 넘어가요.</div>
</div>

<!-- 기록 -->
<div class="page" id="page-history">
  <header><h1>지난 기록 📅</h1></header>
  <div class="cal-head">
    <button onclick="moveMonth(-1)">◀</button>
    <b id="cal-title"></b>
    <button onclick="moveMonth(1)">▶</button>
  </div>
  <div class="cal" id="cal"></div>
  <div class="day-detail" id="day-detail" style="display:none"></div>
</div>

<!-- 루틴 설정 시트 -->
<div id="edit-back" onclick="closeEditTask()"></div>
<div id="edit-sheet">
  <div class="sheet-head">
    <b>루틴 설정</b>
    <button onclick="closeEditTask()" aria-label="닫기">✕</button>
  </div>
  <input id="edit-name" type="text" maxlength="30" class="sheet-input" placeholder="루틴 이름">
  <div class="sheet-label">하는 요일</div>
  <div class="day-presets">
    <button onclick="setEditDays([0,1,2,3,4,5,6])">매일</button>
    <button onclick="setEditDays([1,2,3,4,5])">평일</button>
    <button onclick="setEditDays([0,6])">주말</button>
  </div>
  <div class="day-chips" id="day-chips"></div>
  <button class="sheet-save" onclick="saveEditTask()">저장</button>
</div>

<!-- 타이머 하단 시트 -->
<div id="sheet-back" onclick="closeTimer()"></div>
<div id="timer-sheet">
  <div class="sheet-head">
    <b id="timer-name"></b>
    <button onclick="closeTimer()" aria-label="닫기">✕</button>
  </div>
  <div class="timer-presets" id="timer-presets"></div>
  <div class="timer-circle">
    <svg width="170" height="170" viewBox="0 0 170 170">
      <circle cx="85" cy="85" r="72" fill="none" stroke="#FFE8D6" stroke-width="12"/>
      <circle id="timer-arc" cx="85" cy="85" r="72" fill="none" stroke="#FF8A5C" stroke-width="12"
        stroke-linecap="round" stroke-dasharray="452.4" stroke-dashoffset="0" transform="rotate(-90 85 85)"/>
      <text id="timer-time" x="85" y="94" text-anchor="middle" font-size="30" font-weight="800" fill="#4A3B32">10:00</text>
    </svg>
  </div>
  <div class="timer-btns">
    <button id="timer-start" onclick="startPauseTimer()">▶ 시작</button>
    <button id="timer-reset" onclick="resetTimer()" aria-label="재설정">↺</button>
  </div>
  <div id="timer-msg" class="hint" style="display:none">🎉 타이머 완료! 스탬프가 찍혔어요</div>
</div>

<nav>
  <button class="active" id="tab-today" onclick="showPage('today')"><span class="nicon">☀️</span>Routine</button>
  <button id="tab-todo" onclick="showPage('todo')"><span class="nicon">📝</span>To-do</button>
  <button id="tab-history" onclick="showPage('history')"><span class="nicon">📅</span>기록</button>
</nav>

<script>
// ---------- storage (localStorage, 실패 시 메모리) ----------
var mem = {};
function sGet(k){ try { return localStorage.getItem(k); } catch(e){ return mem[k]||null; } }
function sSet(k,v){ try { localStorage.setItem(k,v); } catch(e){ mem[k]=v; } }

var DEFAULT_TASKS = [
  {id:1,  emoji:"💧", name:"아침 따뜻한물 350ml + 소금"},
  {id:2,  emoji:"🤸", name:"인스타 공복운동 10분"},
  {id:3,  emoji:"🏃", name:"5km 달리기 30분"},
  {id:4,  emoji:"🚿", name:"샤워"},
  {id:5,  emoji:"🧹", name:"청소"},
  {id:6,  emoji:"📧", name:"이메일 (오전)"},
  {id:7,  emoji:"💻", name:"IT 프로젝트"},
  {id:8,  emoji:"🍚", name:"점심"},
  {id:9,  emoji:"📖", name:"한국책"},
  {id:10, emoji:"📚", name:"영어책"},
  {id:11, emoji:"📸", name:"인스타 업로드"},
  {id:12, emoji:"🎬", name:"유튜브"},
  {id:13, emoji:"📨", name:"이메일 (오후)"},
  {id:14, emoji:"🧠", name:"세컨브레인"},
  {id:15, emoji:"🍽️", name:"저녁"},
  {id:16, emoji:"🎸", name:"기타연습"}
];
var EMOJIS = ["💧","🤸","🏃","🚿","🧹","📧","💻","🍚","📖","📚","📸","🎬","🧠","🍽️","🎸","☕","💊","🧘","✍️","🛏️","🌙","🐶","🌱","💪"];

function loadTasks(){
  var raw = sGet("routine_tasks");
  if(raw){ try { return JSON.parse(raw); } catch(e){} }
  return JSON.parse(JSON.stringify(DEFAULT_TASKS));
}
function saveTasks(){ sSet("routine_tasks", JSON.stringify(tasks)); }
function loadLog(){
  var raw = sGet("routine_log");
  if(raw){ try { return JSON.parse(raw); } catch(e){} }
  return {};
}
function saveLog(){ sSet("routine_log", JSON.stringify(log)); }

var tasks = loadTasks();
var log = loadLog();

function dstr(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function todayStr(){ return dstr(new Date()); }

// ---------- 오늘 ----------
function renderToday(){
  var d = new Date();
  var dow = ["일","월","화","수","목","금","토"];
  document.getElementById("today-date").textContent =
    d.getFullYear()+"년 "+(d.getMonth()+1)+"월 "+d.getDate()+"일 ("+dow[d.getDay()]+")";
  var done = log[todayStr()] || {};
  var listEl = document.getElementById("task-list");
  listEl.innerHTML = "";
  var doneCount = 0;
  var dowToday = d.getDay();
  var todays = tasks.filter(function(t){ return !t.days || t.days.indexOf(dowToday) !== -1; });
  todays.forEach(function(t){
    var isDone = !!done[t.id];
    if(isDone) doneCount++;
    var wrap = document.createElement("div");
    wrap.className = "task-wrap";
    wrap.dataset.id = t.id;
    var delBtn = document.createElement("button");
    delBtn.className = "swipe-del";
    delBtn.textContent = "삭제";
    delBtn.onclick = function(){
      if(confirm('"'+t.name+'" 루틴을 삭제할까요?')){
        tasks = tasks.filter(function(x){ return x.id !== t.id; });
        saveTasks(); openSwipe = null; renderToday();
      }
    };
    var el = document.createElement("div");
    el.className = "task"+(isDone?" done":"");
    var iconBtn = document.createElement("button");
    iconBtn.className = "icon-btn"+(isDone?" on":"");
    iconBtn.innerHTML = '<span>'+t.emoji+'</span>'+(isDone?'<span class="badge stamp">✔</span>':'');
    iconBtn.onclick = function(){ if(!justDragged) toggle(t.id); };
    var name = document.createElement("span");
    name.className = "name"; name.textContent = t.name;
    if(t.days){
      var sub = document.createElement("span");
      sub.className = "day-sub";
      sub.textContent = dayLabel(t.days);
      name.appendChild(sub);
    }
    name.onclick = function(){ if(!justDragged) openEditTask(t.id); };
    var chip = document.createElement("button");
    chip.className = "timer-chip";
    chip.id = "chip-" + t.id;
    chip.textContent = "⏱ " + (t.timer || 10) + "분";
    chip.onclick = function(){ if(!justDragged) openTimer(t.id); };
    var handle = document.createElement("span");
    handle.className = "drag-handle";
    handle.textContent = "≡";
    el.appendChild(iconBtn); el.appendChild(name); el.appendChild(chip); el.appendChild(handle);
    wrap.appendChild(delBtn); wrap.appendChild(el);
    attachSwipe(wrap, el);
    listEl.appendChild(wrap);
  });
  var total = todays.length;
  var pct = total ? Math.round(doneCount/total*100) : 0;
  document.getElementById("prog-text").textContent = doneCount+" / "+total+" 완료";
  document.getElementById("prog-pct").textContent = pct+"%";
  document.getElementById("prog-fill").style.width = pct+"%";
  document.getElementById("cheer").style.display = (total>0 && doneCount===total) ? "block" : "none";
}
function toggle(id){
  var key = todayStr();
  if(!log[key]) log[key] = {};
  if(log[key][id]) delete log[key][id];
  else {
    log[key][id] = true;
    if(navigator.vibrate) navigator.vibrate(30);
  }
  saveLog();
  renderToday();
}
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// ---------- 제스처: 왼쪽 스와이프 삭제 (순서 이동은 SortableJS가 담당) ----------
var justDragged = false, openSwipe = null, sorting = false;
function closeSwipe(){
  if(openSwipe){ openSwipe.style.transform = ""; openSwipe = null; }
}
function attachSwipe(row, inner){
  var swiping = false, sX = 0, sY = 0, curX = 0;
  row.addEventListener("touchmove", function(e){
    if(swiping) e.preventDefault();
  }, { passive:false });
  row.addEventListener("pointerdown", function(e){
    if(e.target && e.target.closest && e.target.closest(".drag-handle")) return;
    sX = e.clientX; sY = e.clientY; curX = 0;
    if(openSwipe && openSwipe !== inner){
      closeSwipe();
    } else if(openSwipe === inner){
      closeSwipe();
      justDragged = true; setTimeout(function(){ justDragged = false; }, 300);
    }
  });
  row.addEventListener("pointermove", function(e){
    if(sorting) return;
    if(e.target && e.target.closest && e.target.closest(".drag-handle")) return;
    var dx = e.clientX - sX, dy = e.clientY - sY;
    if(swiping){
      curX = Math.max(-80, Math.min(0, dx));
      inner.style.transform = "translateX("+curX+"px)";
      return;
    }
    if(dx < -12 && Math.abs(dx) > Math.abs(dy)){
      swiping = true;
      try { row.setPointerCapture(e.pointerId); } catch(err){}
    }
  });
  function finish(){
    if(swiping){
      swiping = false;
      if(curX < -40){ inner.style.transform = "translateX(-80px)"; openSwipe = inner; }
      else { inner.style.transform = ""; }
      justDragged = true;
      setTimeout(function(){ justDragged = false; }, 300);
    }
  }
  row.addEventListener("pointerup", finish);
  row.addEventListener("pointercancel", finish);
}

// ---------- SortableJS: 길게 눌러 순서 이동 ----------
function reorderFromDom(listEl, arr, save, render){
  var order = [].slice.call(listEl.children)
    .filter(function(c){ return c.dataset && c.dataset.id; })
    .map(function(c){ return c.dataset.id; });
  // 화면에 보이는 항목들만 새 순서로 재배치 (오늘 요일이 아닌 루틴은 제자리 유지)
  var visIdx = [];
  arr.forEach(function(t, i){ if(order.indexOf(String(t.id)) !== -1) visIdx.push(i); });
  var visSorted = order.map(function(id){
    for(var i=0;i<arr.length;i++) if(String(arr[i].id) === id) return arr[i];
  }).filter(Boolean);
  visIdx.forEach(function(pos, k){ if(visSorted[k]) arr[pos] = visSorted[k]; });
  save();
  justDragged = true;
  setTimeout(function(){ justDragged = false; }, 300);
  render();
}
function initSortables(){
  if(typeof Sortable === "undefined") return;
  var taskList = document.getElementById("task-list");
  new Sortable(taskList, {
    animation: 150,
    handle: ".drag-handle",
    draggable: ".task-wrap",
    ghostClass: "sort-ghost",
    onChoose: function(){ if(navigator.vibrate) navigator.vibrate(40); closeSwipe(); },
    onStart: function(){ sorting = true; },
    onEnd: function(){
      sorting = false;
      reorderFromDom(taskList, tasks, saveTasks, renderToday);
    }
  });
  var todoList = document.getElementById("todo-list");
  new Sortable(todoList, {
    animation: 150,
    handle: ".drag-handle",
    draggable: ".todo-item",
    ghostClass: "sort-ghost",
    onChoose: function(){ if(navigator.vibrate) navigator.vibrate(40); },
    onStart: function(){ sorting = true; },
    onEnd: function(){
      sorting = false;
      reorderFromDom(todoList, todos, saveTodos, renderTodo);
    }
  });
}

var selRoutineEmoji = "✨";

  var row = document.getElementById("routine-emoji-row");
  if(row.style.display === "none"){
    row.innerHTML = "";
    EMOJIS.forEach(function(em){
      var b = document.createElement("button");

      b.className = (em === selRoutineEmoji) ? "sel" : "";

        selRoutineEmoji = em;

        row.style.display = "none";
      };
      row.appendChild(b);
    });
    row.style.display = "flex";

  }

function addRoutineInline(){
  var input = document.getElementById("routine-input");
  var name = input.value.trim();
  if(!name){ input.focus(); return; }
  var maxId = 0;
  tasks.forEach(function(t){ if(t.id>maxId) maxId = t.id; });
  Object.keys(log).forEach(function(k){
    Object.keys(log[k]).forEach(function(id){ if(+id>maxId) maxId = +id; });
  });
  tasks.push({ id:maxId+1, emoji:selRoutineEmoji, name:name });
  saveTasks();
  input.value = "";
  renderToday();
}

// ---------- 기록 ----------
var calY, calM, selDay = null;
function initCal(){ var d = new Date(); calY = d.getFullYear(); calM = d.getMonth(); }
function moveMonth(n){
  calM += n;
  if(calM<0){ calM=11; calY--; }
  if(calM>11){ calM=0; calY++; }
  selDay = null;
  renderCal();
}
function renderCal(){
  document.getElementById("cal-title").textContent = calY+"년 "+(calM+1)+"월";
  var cal = document.getElementById("cal");
  cal.innerHTML = "";
  ["일","월","화","수","목","금","토"].forEach(function(w){
    var e = document.createElement("div"); e.className="dow"; e.textContent=w; cal.appendChild(e);
  });
  var first = new Date(calY, calM, 1).getDay();
  var days = new Date(calY, calM+1, 0).getDate();
  var tStr = todayStr();
  for(var i=0;i<first;i++){ var e=document.createElement("div"); e.className="cell empty"; cal.appendChild(e); }
  for(var day=1; day<=days; day++){
    (function(day){
      var key = dstr(new Date(calY, calM, day));
      var done = log[key] ? Object.keys(log[key]).length : 0;
      var cell = document.createElement("div");
      cell.className = "cell"+(key===tStr?" today":"")+(selDay===key?" sel":"");
      var dw = new Date(calY, calM, day).getDay();
      var totalForDay = tasks.filter(function(t){ return !t.days || t.days.indexOf(dw) !== -1; }).length;
      var mini = done>0 ? '<span class="mini">'+(done>=totalForDay&&totalForDay>0?"🌟":"✅"+done)+'</span>' : '<span class="mini">&nbsp;</span>';
      cell.innerHTML = day + mini;
      cell.onclick = function(){ selDay = key; renderCal(); renderDayDetail(key); };
      cal.appendChild(cell);
    })(day);
  }
}
function renderDayDetail(key){
  var box = document.getElementById("day-detail");
  box.style.display = "block";
  var done = log[key] || {};
  var doneIds = Object.keys(done);
  var html = "<h3>☀️ "+key+" 완료한 루틴 ("+doneIds.length+"개)</h3>";
  if(doneIds.length===0){
    html += '<div class="no">완료 기록이 없어요</div>';
  } else {
    tasks.forEach(function(t){ if(done[t.id]) html += "<div>"+t.emoji+" "+esc(t.name)+"</div>"; });
    // 삭제된 할일의 기록도 표시
    var known = {}; tasks.forEach(function(t){ known[t.id]=true; });
    doneIds.forEach(function(id){ if(!known[id]) html += '<div>✅ (삭제된 할일)</div>'; });
  }
  var tdl = todoLog[key] || {};
  var tdlIds = Object.keys(tdl);
  html += '<h3 style="margin-top:12px">📝 완료한 투두 ('+tdlIds.length+'개)</h3>';
  if(tdlIds.length===0){
    html += '<div class="no">완료 기록이 없어요</div>';
  } else {
    tdlIds.forEach(function(id){ html += "<div>✅ "+esc(tdl[id])+"</div>"; });
  }
  box.innerHTML = html;
}

// ---------- To-do ----------
function loadTodos(){
  var raw = sGet("routine_todos");
  if(raw){ try { return JSON.parse(raw); } catch(e){} }
  return [];
}
function saveTodos(){ sSet("routine_todos", JSON.stringify(todos)); }
var todos = loadTodos();

// 날짜별 완료한 투두 기록 {날짜: {투두id: 내용}}
function loadTodoLog(){
  var raw = sGet("routine_todo_log");
  if(raw){ try { return JSON.parse(raw); } catch(e){} }
  return {};
}
function saveTodoLog(){ sSet("routine_todo_log", JSON.stringify(todoLog)); }
var todoLog = loadTodoLog();

function purgeOldDone(){
  // 지난날 완료한 투두는 목록에서 정리 (미완료는 이월되어 계속 표시)
  var t = todayStr();
  var before = todos.length;
  todos = todos.filter(function(td){ return !td.done || td.doneDate === t; });
  if(todos.length !== before) saveTodos();
}
function renderTodo(){
  purgeOldDone();
  var d = new Date();
  var dow = ["일","월","화","수","목","금","토"];
  document.getElementById("todo-date").textContent =
    d.getFullYear()+"년 "+(d.getMonth()+1)+"월 "+d.getDate()+"일 ("+dow[d.getDay()]+")";
  var list = document.getElementById("todo-list");
  list.innerHTML = "";
  if(todos.length===0){
    list.innerHTML = '<div class="hint" style="padding-top:4px">아직 할일이 없어요. 위에 입력해보세요!</div>';
    return;
  }
  var t = todayStr();
  todos.forEach(function(td){
    var el = document.createElement("div");
    el.className = "todo-item"+(td.done?" done":"");
    el.dataset.id = td.id;
    var chk = document.createElement("button");
    chk.className = "chk";
    chk.innerHTML = td.done ? '<span class="stamp">✅</span>' : '';
    chk.onclick = function(){
      if(justDragged) return;
      td.done = !td.done;
      td.doneDate = td.done ? t : null;
      if(!todoLog[t]) todoLog[t] = {};
      if(td.done){
        todoLog[t][td.id] = td.text;
        if(navigator.vibrate) navigator.vibrate(30);
      } else {
        delete todoLog[t][td.id];
        if(Object.keys(todoLog[t]).length===0) delete todoLog[t];
      }
      saveTodoLog(); saveTodos(); renderTodo();
    };
    var txt = document.createElement("span");
    txt.className = "txt";
    txt.textContent = td.text;
    if(td.created && td.created !== t && !td.done){
      var old = document.createElement("span");
      old.className = "old";
      old.textContent = " ("+td.created.slice(5).replace("-","/")+"부터)";
      txt.appendChild(old);
    }
    txt.onclick = function(){
      if(justDragged) return;
      var v = prompt("할일 수정", td.text);
      if(v!==null && v.trim()){ td.text = v.trim(); saveTodos(); renderTodo(); }
    };
    var del = document.createElement("button");
    del.className = "del";
    del.textContent = "✕";
    del.onclick = function(){
      if(justDragged) return;
      if(confirm('"'+td.text+'" 을(를) 삭제할까요?')){
        todos = todos.filter(function(x){ return x !== td; });
        saveTodos(); renderTodo();
      }
    };
    var handle = document.createElement("span");
    handle.className = "drag-handle";
    handle.textContent = "≡";
    el.appendChild(chk); el.appendChild(txt); el.appendChild(del); el.appendChild(handle);
    list.appendChild(el);
  });
}
function addTodo(){
  var input = document.getElementById("todo-input");
  var text = input.value.trim();
  if(!text){ input.focus(); return; }
  todos.push({ id: Date.now(), text: text, done: false, doneDate: null, created: todayStr() });
  saveTodos();
  input.value = "";
  renderTodo();
}
document.addEventListener("DOMContentLoaded", function(){
  var inp = document.getElementById("todo-input");
  if(inp) inp.addEventListener("keydown", function(e){ if(e.key==="Enter") addTodo(); });
  var rinp = document.getElementById("routine-input");
  if(rinp) rinp.addEventListener("keydown", function(e){ if(e.key==="Enter") addRoutineInline(); });
});

// ---------- 구글캘린더 ----------
var GOOGLE_CLIENT_ID = "843415680672-nutva8fu3letg1pdu1j75d9agakm779v.apps.googleusercontent.com";
var gcalToken = null, gcalTokenClient = null;

function gcalReady(){ return GOOGLE_CLIENT_ID.indexOf("여기에") === -1 && window.google && google.accounts; }

function connectGcal(){
  var note = document.getElementById("gcal-note");
  if(!gcalReady()){
    note.textContent = GOOGLE_CLIENT_ID.indexOf("여기에") === 0
      ? "아직 연동 설정이 안 됐어요 (클라이언트 ID 필요)"
      : "구글 로그인 모듈을 불러오는 중이에요. 잠시 후 다시 눌러주세요.";
    return;
  }
  gcalTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: "https://www.googleapis.com/auth/calendar.readonly",
    hint: sGet("gcal_hint") || "",
    callback: function(resp){
      if(resp && resp.access_token){
        gcalToken = resp.access_token;
        sSet("gcal_connected","1");
        // 토큰 저장: 유효시간 동안은 인증창 없이 재사용
        var exp = Date.now() + (Number(resp.expires_in || 3600) - 60) * 1000;
        sSet("gcal_token", JSON.stringify({ t: resp.access_token, exp: exp }));
        if(!sGet("gcal_hint")) saveGcalHint();
        fetchGcalEvents();
      }
    }
  });
  gcalTokenClient.requestAccessToken({ prompt: sGet("gcal_connected") ? "" : "consent" });
}
// 계정 이메일을 저장해두면 다음 인증 때 계정 선택창이 생략됨
function saveGcalHint(){
  fetch("https://www.googleapis.com/calendar/v3/calendars/primary", { headers: { "Authorization": "Bearer " + gcalToken } })
    .then(function(r){ return r.json(); })
    .then(function(d){ if(d && d.id) sSet("gcal_hint", d.id); })
    .catch(function(){});
}
function getSavedGcalToken(){
  try {
    var s = JSON.parse(sGet("gcal_token"));
    if(s && s.t && s.exp > Date.now()) return s.t;
  } catch(e){}
  return null;
}

function fetchGcalEvents(){
  var note = document.getElementById("gcal-note");
  var list = document.getElementById("gcal-list");
  note.textContent = "일정을 불러오는 중...";
  var d = new Date();
  var start = new Date(d.getFullYear(), d.getMonth(), d.getDate()).toISOString();
  var end = new Date(d.getFullYear(), d.getMonth(), d.getDate()+1).toISOString();
  var H = { "Authorization": "Bearer " + gcalToken };
  // 1) 계정의 모든 캘린더 목록 조회 (구글캘린더에서 표시 중인 것만)
  fetch("https://www.googleapis.com/calendar/v3/users/me/calendarList", { headers: H })
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(cl){
      var cals = (cl.items || []).filter(function(c){ return c.selected || c.primary; });
      if(cals.length === 0) cals = [{ id: "primary", primary: true }];
      // 2) 캘린더별로 오늘 일정 조회
      return Promise.all(cals.map(function(c){
        var url = "https://www.googleapis.com/calendar/v3/calendars/" + encodeURIComponent(c.id) + "/events"
          + "?timeMin=" + encodeURIComponent(start)
          + "&timeMax=" + encodeURIComponent(end)
          + "&singleEvents=true&orderBy=startTime&maxResults=30";
        return fetch(url, { headers: H })
          .then(function(r){ return r.ok ? r.json() : { items: [] }; })
          .then(function(data){
            return (data.items || []).map(function(ev){
              ev._cal = c.primary ? "" : (c.summaryOverride || c.summary || "");
              return ev;
            });
          });
      }));
    })
    .then(function(results){
      // 3) 합치고 중복 제거 후 시간순 정렬
      var items = [], seen = {};
      results.forEach(function(arr){
        arr.forEach(function(ev){
          if(ev.id && seen[ev.id]) return;
          if(ev.id) seen[ev.id] = true;
          items.push(ev);
        });
      });
      items.sort(function(a,b){
        var av = (a.start && (a.start.dateTime || a.start.date)) || "";
        var bv = (b.start && (b.start.dateTime || b.start.date)) || "";
        return av < bv ? -1 : av > bv ? 1 : 0;
      });
      list.innerHTML = "";
      if(items.length === 0){
        note.textContent = "오늘 일정이 없어요 🎈";
      } else {
        note.textContent = "";
        items.forEach(function(ev){
          var row = document.createElement("div");
          row.className = "gevent";
          var time = "종일";
          if(ev.start && ev.start.dateTime){
            var s = new Date(ev.start.dateTime);
            time = String(s.getHours()).padStart(2,"0")+":"+String(s.getMinutes()).padStart(2,"0");
            if(ev.end && ev.end.dateTime){
              var e2 = new Date(ev.end.dateTime);
              time += "~"+String(e2.getHours()).padStart(2,"0")+":"+String(e2.getMinutes()).padStart(2,"0");
            }
          }
          var calTag = ev._cal ? ' <span class="gcal-cal">'+esc(ev._cal)+'</span>' : '';
          row.innerHTML = '<span class="gtime">'+time+'</span><span>'+esc(ev.summary || "(제목 없음)")+calTag+'</span>';
          list.appendChild(row);
        });
      }
      document.getElementById("gcal-btn").textContent = "🔄 일정 새로고침";
    })
    .catch(function(){
      note.textContent = "일정을 불러오지 못했어요. 다시 연결해주세요.";
      gcalToken = null;
      sSet("gcal_token", "");
    });
}

// ---------- 루틴 설정 (이름 + 요일) ----------
var editingTaskId = null, editDays = [];
function dayLabel(days){
  var W = ["일","월","화","수","목","금","토"];
  var s = days.slice().sort(function(a,b){ return a-b; });
  if(s.join(",") === "1,2,3,4,5") return "평일";
  if(s.join(",") === "0,6") return "주말";
  return s.map(function(d){ return W[d]; }).join("·");
}
function findTask(id){
  for(var i=0;i<tasks.length;i++) if(tasks[i].id === id) return tasks[i];
  return null;
}
function openEditTask(id){
  var t = findTask(id);
  if(!t) return;
  editingTaskId = id;
  document.getElementById("edit-name").value = t.name;
  editDays = t.days ? t.days.slice() : [0,1,2,3,4,5,6];
  renderDayChips();
  document.getElementById("edit-back").style.display = "block";
  document.getElementById("edit-sheet").style.display = "block";
}
function closeEditTask(){
  document.getElementById("edit-back").style.display = "none";
  document.getElementById("edit-sheet").style.display = "none";
}
function renderDayChips(){
  var W = ["일","월","화","수","목","금","토"];
  var box = document.getElementById("day-chips");
  box.innerHTML = "";
  W.forEach(function(w, dnum){
    var b = document.createElement("button");
    b.textContent = w;
    b.className = editDays.indexOf(dnum) !== -1 ? "sel" : "";
    b.onclick = function(){
      var i = editDays.indexOf(dnum);
      if(i === -1) editDays.push(dnum); else editDays.splice(i, 1);
      renderDayChips();
    };
    box.appendChild(b);
  });
}
function setEditDays(days){ editDays = days.slice(); renderDayChips(); }
function saveEditTask(){
  var t = findTask(editingTaskId);
  if(!t) return;
  var v = document.getElementById("edit-name").value.trim();
  if(!v){ document.getElementById("edit-name").focus(); return; }
  if(editDays.length === 0){ alert("요일을 하나 이상 선택해주세요"); return; }
  t.name = v;
  if(editDays.length === 7) delete t.days;
  else t.days = editDays.slice().sort(function(a,b){ return a-b; });
  saveTasks();
  closeEditTask();
  renderToday();
}

// ---------- 타이머 ----------
var TIMER_CIRC = 452.4;
var timerState = { id:null, total:600, left:600, endAt:null, running:false };
var timerTick = null;

function timerTask(){
  for(var i=0;i<tasks.length;i++) if(tasks[i].id === timerState.id) return tasks[i];
  return null;
}
function fmtTime(s){ return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"); }
function timerRemaining(){
  return timerState.endAt ? Math.max(0, Math.round((timerState.endAt - Date.now())/1000)) : timerState.left;
}
function openTimer(id){
  if(timerState.id !== id){
    if(timerState.running){
      if(!confirm("진행 중인 타이머를 중단하고 새로 시작할까요?")){
        showTimerSheet(); return;
      }
      clearInterval(timerTick);
    }
    timerState.id = id;
    var t = timerTask();
    var mins = (t && t.timer) || 10;
    timerState.total = mins*60;
    timerState.left = timerState.total;
    timerState.endAt = null;
    timerState.running = false;
    sSet("routine_timer","");
  }
  showTimerSheet();
}
function showTimerSheet(){
  var t = timerTask();
  if(!t) return;
  document.getElementById("timer-name").textContent = t.emoji + " " + t.name;
  document.getElementById("timer-msg").style.display = "none";
  renderTimerPresets();
  updateTimerUI();
  document.getElementById("sheet-back").style.display = "block";
  document.getElementById("timer-sheet").style.display = "block";
}
function closeTimer(){
  document.getElementById("sheet-back").style.display = "none";
  document.getElementById("timer-sheet").style.display = "none";
}
function renderTimerPresets(){
  var box = document.getElementById("timer-presets");
  box.innerHTML = "";
  [5,10,15,20,30].forEach(function(m){
    var b = document.createElement("button");
    b.textContent = m + "분";
    b.className = (m*60 === timerState.total) ? "sel" : "";
    b.onclick = function(){ setTimerTotal(m*60); };
    box.appendChild(b);
  });
  var inp = document.createElement("input");
  inp.type = "number"; inp.min = "1"; inp.max = "180";
  inp.placeholder = "직접(분)";
  inp.value = ([5,10,15,20,30].indexOf(timerState.total/60) === -1) ? String(Math.round(timerState.total/60)) : "";
  inp.onchange = function(){
    var v = parseInt(inp.value, 10);
    if(v > 0 && v <= 180) setTimerTotal(v*60);
  };
  box.appendChild(inp);
}
function setTimerTotal(sec){
  timerState.total = sec;
  timerState.left = sec;
  timerState.endAt = null;
  timerState.running = false;
  sSet("routine_timer","");
  var t = timerTask();
  if(t){ t.timer = Math.round(sec/60); saveTasks(); renderToday(); }
  document.getElementById("timer-msg").style.display = "none";
  renderTimerPresets();
  updateTimerUI();
}
function updateTimerUI(){
  var l = timerRemaining();
  if(timerState.running) timerState.left = l;
  var timeEl = document.getElementById("timer-time");
  if(timeEl) timeEl.textContent = fmtTime(l);
  var arc = document.getElementById("timer-arc");
  if(arc) arc.setAttribute("stroke-dashoffset", String(TIMER_CIRC * (1 - (timerState.total ? l/timerState.total : 0))));
  var btn = document.getElementById("timer-start");
  if(btn) btn.textContent = timerState.running ? "⏸ 일시정지" : "▶ 시작";
  var chip = document.getElementById("chip-" + timerState.id);
  if(chip) chip.textContent = timerState.running ? "⏱ " + fmtTime(l) : "⏱ " + Math.round(timerState.total/60) + "분";
}
function startTimerTick(){
  clearInterval(timerTick);
  timerTick = setInterval(function(){
    if(!timerState.running) return;
    if(timerRemaining() <= 0) finishTimer();
    else updateTimerUI();
  }, 500);
}
function startPauseTimer(){
  if(!timerTask()) return;
  if(timerState.running){
    timerState.left = timerRemaining();
    timerState.endAt = null;
    timerState.running = false;
    clearInterval(timerTick);
    sSet("routine_timer","");
  } else {
    if(timerState.left <= 0) timerState.left = timerState.total;
    ensureAudio();
    timerState.endAt = Date.now() + timerState.left*1000;
    timerState.running = true;
    var t = timerTask();
    t.timer = Math.round(timerState.total/60); saveTasks();
    sSet("routine_timer", JSON.stringify({ id:timerState.id, total:timerState.total, endAt:timerState.endAt }));
    document.getElementById("timer-msg").style.display = "none";
    startTimerTick();
  }
  updateTimerUI();
}
function resetTimer(){
  timerState.left = timerState.total;
  timerState.endAt = null;
  timerState.running = false;
  clearInterval(timerTick);
  sSet("routine_timer","");
  document.getElementById("timer-msg").style.display = "none";
  updateTimerUI();
}
function stampTask(id){
  var key = todayStr();
  if(!log[key]) log[key] = {};
  if(!log[key][id]){ log[key][id] = true; saveLog(); }
  renderToday();
}
function finishTimer(){
  timerState.running = false;
  timerState.endAt = null;
  timerState.left = 0;
  clearInterval(timerTick);
  sSet("routine_timer","");
  stampTask(timerState.id);
  if(navigator.vibrate) navigator.vibrate([300,150,300,150,300,150,600,300,300,150,300,150,600]);
  beep();
  document.getElementById("timer-msg").style.display = "block";
  updateTimerUI();
}
function ensureAudio(){
  try {
    var Ctx = window.AudioContext || window.webkitAudioContext;
    if(Ctx && !window._actx) window._actx = new Ctx();
    if(window._actx && window._actx.state === "suspended") window._actx.resume();
  } catch(e){}
}
function beep(){
  try {
    var ctx = window._actx;
    if(!ctx) return;
    // 알람: 삐-삐 2연타 x 8회, 약 6초간
    for(var i=0;i<8;i++){
      var base = ctx.currentTime + i*0.75;
      [0, 0.22].forEach(function(off){
        var o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = "square";
        o.frequency.value = 1200;
        var t0 = base + off;
        g.gain.setValueAtTime(0.001, t0);
        g.gain.exponentialRampToValueAtTime(0.9, t0+0.02);
        g.gain.setValueAtTime(0.9, t0+0.15);
        g.gain.exponentialRampToValueAtTime(0.001, t0+0.2);
        o.start(t0); o.stop(t0+0.21);
      });
    }
  } catch(e){}
}

// ---------- 탭 ----------
function showPage(p){
  ["today","todo","history"].forEach(function(n){
    document.getElementById("page-"+n).classList.toggle("show", n===p);
    document.getElementById("tab-"+n).classList.toggle("active", n===p);
  });
  if(p==="today") renderToday();
  if(p==="todo"){
    renderTodo();
    if(!gcalToken){
      var saved = getSavedGcalToken();
      if(saved){ gcalToken = saved; fetchGcalEvents(); }
      else if(sGet("gcal_connected") && gcalReady()) connectGcal();
    }
  }
  if(p==="history"){ initCalIfNeeded(); renderCal(); }
}
var calInit = false;
function initCalIfNeeded(){ if(!calInit){ initCal(); calInit = true; } }

// 자정 넘어가면 자동 갱신
var lastDay = todayStr();
setInterval(function(){
  if(todayStr()!==lastDay){ lastDay = todayStr(); renderToday(); renderTodo(); }
}, 30000);

renderToday();
initSortables();

// 앱 재시작 시 진행 중이던 타이머 복원
(function(){
  try {
    var s = JSON.parse(sGet("routine_timer"));
    if(s && s.id && s.endAt){
      timerState.id = s.id;
      timerState.total = s.total || 600;
      if(s.endAt > Date.now()){
        timerState.endAt = s.endAt;
        timerState.running = true;
        timerState.left = Math.round((s.endAt - Date.now())/1000);
        startTimerTick();
        updateTimerUI();
      } else {
        // 앱이 꺼진 사이에 끝난 타이머: 스탬프 처리
        stampTask(s.id);
        sSet("routine_timer","");
      }
    }
  } catch(e){}
})();

document.getElementById("todo-list").addEventListener("contextmenu", function(e){ e.preventDefault(); });

  navigator.serviceWorker.register("sw.js").catch(function(){});
